name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:   # Allows manual trigger from GitHub web UI

jobs:
  build:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android APK (Preview)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait
        working-directory: .

      - name: Summary
        run: |
          echo "✅ Build triggered on EAS."
          echo "👉 Check build status and download your APK at: https://expo.dev"
          echo "   Log in → your project → Builds tab"
